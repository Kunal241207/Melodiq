<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melodiq</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <h1>melodi<span>q</span></h1>
  <input id="searchInput" type="text" placeholder="Search songs..." />
</header>

<div class="container">
  <div class="toolbar">
    <div class="tabs">
      <button class="tab active" id="allTab">All Tracks</button>
      <button class="tab" id="likedTab">♡ Liked <span id="likedCount">0</span></button>
    </div>
    <select id="sortSelect">
      <option value="default">Sort: Default</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="dur">Duration</option>
    </select>
  </div>

  <div id="genreBar"></div>

  <div id="loader" class="hidden">Loading...</div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Time</th>
        <th>Preview</th>
        <th>Liked</th>
      </tr>
    </thead>
    <tbody id="songsBody"></tbody>
  </table>
</div>

<script src="script.js"></script>
</body>
</html>
